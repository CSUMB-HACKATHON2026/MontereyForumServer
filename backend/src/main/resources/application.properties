spring.application.name=backend

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:monterey_forum;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# Google OAuth (optional). Our app uses manual OAuth URLs — use app.oauth2.* so the server starts without GOOGLE_* set.
app.oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
app.oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# HS256 signing secret (any string; SHA-256 hashed internally). Override in production.
app.auth.jwt.secret=${APP_AUTH_JWT_SECRET:dev-only-change-me}
app.auth.jwt.access-ttl-ms=86400000
app.auth.jwt.refresh-ttl-ms=2592000000

# Public URL of this API for OAuth redirects (e.g. behind a reverse proxy). If empty, derived from the incoming HTTP request.
app.public-origin=${APP_PUBLIC_ORIGIN:}

app.oauth2.github.client-id=${GITHUB_CLIENT_ID:}
app.oauth2.github.client-secret=${GITHUB_CLIENT_SECRET:}

# Comma-separated emails that receive ADMIN role in JWT (OAuth + email login).
app.security.admin-emails=${APP_SECURITY_ADMIN_EMAILS:admin@admin.com}

# Category id used when an admin posts an announcement (must exist in your categories table).
app.announcements.category-id=1